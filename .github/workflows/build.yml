name: Build

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev

      - name: Install Task
        shell: bash
        run: go install github.com/go-task/task/v3/cmd/task@latest

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build app
        run: task build

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "bin/pinthenote.exe" "dist/pinthenote-windows-${{ runner.arch }}.exe"

      - name: Prepare artifact (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist
          cp "bin/pinthenote" "dist/pinthenote-linux-${{ runner.arch }}"
          chmod +x "dist/pinthenote-linux-${{ runner.arch }}"

      - name: Prepare artifact (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist
          cp "bin/pinthenote" "dist/pinthenote-macos-${{ runner.arch }}"
          chmod +x "dist/pinthenote-macos-${{ runner.arch }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pinthenote-${{ runner.os }}-${{ runner.arch }}
          path: dist/*
          if-no-files-found: error
